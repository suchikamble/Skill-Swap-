<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #4f46e5;
            color: white;
            padding: 15px;
            text-align: center;
        }
        input, select, button {
            width: 90%;
            max-width: 300px;
            padding: 12px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
        }
        .container {
            flex: 1;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        .container.active {
            display: flex;
        }
        .profile-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            text-align: left;
        }
        h2 {
            margin-bottom: 20px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .tag {
            background: #6A5ACD;
            color: white;
            border-radius: 10px;
            padding: 5px 10px;
            margin: 5px;
            display: flex;
            align-items: center;
        }
        .tag button {
            background: transparent;
            border: none;
            color: white;
            margin-left: 5px;
            cursor: pointer;
        }
        .navbar {
            display: none;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #f4f6f8;
            padding: 10px 0;
            box-shadow: 0 -1px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar button {
            background: none;
            border: none;
            color: #6A5ACD;
            font-size: 18px;
            cursor: pointer;
        }
        .navbar button.active {
            font-weight: bold;
        }
        .floating-btn {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #6A5ACD;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>SkillSwap </h1>
			<h3>“Exchange Skills. Expand Horizons.”</h3>

    </header>

    <!-- LOGIN PAGE -->
    <div id="login" class="container active">
        <h2>Login</h2>
        <input id="lemail" placeholder="Email"><br>
        <input id="lpassword" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
    </div>

    <!-- SIGNUP PAGE -->
    <div id="signup" class="container">
        <h2>Create Account</h2>
        <input id="name" placeholder="Name"><br>
        <input id="contact" placeholder="Contact Number"><br>
        <input id="email" placeholder="Email"><br>
        <input id="hobby" placeholder="Favorite Hobby"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="signup()">Register</button>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profile" class="container">
        <div class="profile-card">
            <h2>Profile</h2>
            <p><strong>Name:</strong> <span id="profileName"></span></p>
            <p><strong>Contact:</strong> <span id="profileContact"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Password:</strong> <span id="profilePassword" onclick="showSecurityQuestion()">****</span></p>
            <h3>I Have (Teach)</h3>
            <div class="tags" id="teachTags"></div>
            <h3>I Want (Learn)</h3>
            <div class="tags" id="learnTags"></div>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboard" class="container">
        <h2>Dashboard</h2>
        <button onclick="startMatching()">Find Skill Matches</button>
    </div>

    <!-- DISCOVER PAGE -->
    <div id="discover" class="container">
        <h2>Discover</h2>
        <input class="search-bar" placeholder="Search">
        <!-- Add interactive discover elements here -->
    </div>

    <!-- ADD SKILL MODAL -->
    <div id="skillModal" class="modal">
        <div class="modal-box">
            <h3>Add a Skill</h3>
            <input type="text" id="skillName" placeholder="Skill Name" style="width: 100%; margin-bottom: 10px;">
            <select id="skillType" style="width: 100%; margin-bottom: 10px;">
                <option value="teach">I Have (Teach)</option>
                <option value="learn">I Want (Learn)</option>
            </select>
            <button onclick="addSkill()">Add Skill</button>
            <button onclick="closeSkillModal()" style="background: grey; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <!-- SECURITY QUESTION MODAL -->
    <div id="securityQuestionModal" class="modal">
        <div class="modal-box">
            <h3>Security Question</h3>
            <p>What is your favorite hobby?</p>
            <input type="text" id="securityAnswer" placeholder="Answer" style="width: 100%; margin-bottom: 10px;">
            <button onclick="checkSecurityAnswer()">Submit</button>
            <button onclick="closeSecurityQuestionModal()" style="background: grey; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <!-- FLOATING BUTTON FOR ADDING SKILL -->
    <button class="floating-btn" onclick="openSkillModal()">+</button>

    <!-- NAVIGATION BAR -->
    <div class="navbar">
        <button id="profileTab" onclick="navigate('profile')">Profile</button>
        <button id="dashboardTab" onclick="navigate('dashboard')">Dashboard</button>
        <button id="discoverTab" onclick="navigate('discover')">Discover</button>
    </div>

    <script>
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem("users")) || [];

        function navigate(page) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.navbar button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(page + 'Tab').classList.add('active');
        }

        function openSkillModal() {
            document.getElementById("skillModal").style.display = 'flex';
        }

        function closeSkillModal() {
            document.getElementById("skillModal").style.display = 'none';
        }

        function openSecurityQuestionModal() {
            document.getElementById("securityQuestionModal").style.display = 'flex';
        }

        function closeSecurityQuestionModal() {
            document.getElementById("securityQuestionModal").style.display = 'none';
        }

        function addSkill() {
            const skillName = document.getElementById("skillName").value.trim();
            const skillType = document.getElementById("skillType").value;

            if(skillName) {
                if(skillType === "teach") {
                    currentUser.teach.push(skillName);
                } else {
                    currentUser.learn.push(skillName);
                }
                localStorage.setItem("users", JSON.stringify(users));
                displayProfile();
                closeSkillModal();
                document.getElementById("skillName").value = ''; // Clear input
            } else {
                alert("Please enter a skill name.");
            }
        }

        function removeSkill(skillType, skillIndex) {
            if(skillType === "teach") {
                currentUser.teach.splice(skillIndex, 1);
            } else {
                currentUser.learn.splice(skillIndex, 1);
            }
            localStorage.setItem("users", JSON.stringify(users));
            displayProfile();
        }

        function displayProfile() {
            if (!currentUser) return;
            document.getElementById("profileName").textContent = currentUser.name;
            document.getElementById("profileContact").textContent = currentUser.contact;
            document.getElementById("profileEmail").textContent = currentUser.email;
            document.getElementById("profilePassword").textContent = '****';

            const teachTags = document.getElementById('teachTags');
            const learnTags = document.getElementById('learnTags');
            teachTags.innerHTML = '';
            learnTags.innerHTML = '';
            currentUser.teach.forEach((skill, index) => {
                teachTags.innerHTML += `<div class="tag">${skill} <button onclick="removeSkill('teach', ${index})">✕</button></div>`;
            });
            currentUser.learn.forEach((skill, index) => {
                learnTags.innerHTML += `<div class="tag">${skill} <button onclick="removeSkill('learn', ${index})">✕</button></div>`;
            });
        }

        function signup() {
            const user = {
                name: document.getElementById("name").value,
                contact: document.getElementById("contact").value,
                email: document.getElementById("email").value,
                hobby: document.getElementById("hobby").value,
                password: document.getElementById("password").value,
                teach: [],
                learn: []
            };
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
            alert("Account created");
            location.reload();
        }

        function login() {
            const email = document.getElementById("lemail").value;
            const pass = document.getElementById("lpassword").value;
            currentUser = users.find(u => u.email === email && u.password === pass);
            if (currentUser) {
                navigate('profile'); // Go to Profile after login
                document.querySelector('.navbar').style.display = 'flex';
                displayProfile();
            } else {
                alert("Invalid login");
            }
        }

        function startMatching() {
            alert('Matching logic to be implemented.');
        }

        function showSecurityQuestion() {
            openSecurityQuestionModal();
        }

        function checkSecurityAnswer() {
            const answer = document.getElementById("securityAnswer").value.trim();
            if (answer === currentUser.hobby) {
                document.getElementById("profilePassword").textContent = currentUser.password;
                closeSecurityQuestionModal();
            } else {
                alert('Incorrect answer');
            }
        }
    </script>
</body>
</html>
